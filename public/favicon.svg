<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none">
  <style>
    :root {
      --color-stop-1a: #7F77DD;
      --color-stop-1b: #9F99F0;
      --color-stop-2a: #1D9E75;
      --color-stop-2b: #7F77DD;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-stop-1a: #9F99F0;
        --color-stop-1b: #C8C4F4;
        --color-stop-2a: #1DB88E;
        --color-stop-2b: #9F99F0;
      }
    }
    .grad-1-start { stop-color: var(--color-stop-1a); }
    .grad-1-end { stop-color: var(--color-stop-1b); }
    .grad-2-start { stop-color: var(--color-stop-2a); }
    .grad-2-end { stop-color: var(--color-stop-2b); }
  </style>
  <path d="M12 2 A10 10 0 0 1 22 12" stroke="url(#logo-grad-1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M12 22 A10 10 0 0 1 2 12" stroke="url(#logo-grad-2)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="12" cy="12" r="2.5" fill="url(#logo-grad-1)"/>
  <defs>
    <linearGradient id="logo-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="grad-1-start"/>
      <stop offset="100%" class="grad-1-end"/>
    </linearGradient>
    <linearGradient id="logo-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="grad-2-start"/>
      <stop offset="100%" class="grad-2-end"/>
    </linearGradient>
  </defs>
</svg>